<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlowBoard — Project Management for OpenClaw</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles/dashboard.css?v=24">
  <!-- Telegram WebApp SDK (loads tg object, also used for graceful degradation check) -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
<script>
  // Graceful Degradation — client-side check before app loads
  // If opened outside Telegram AND no session cookie → show info page
  const _tg = window.Telegram?.WebApp;
  const _isLocal = ['localhost', '127.0.0.1'].includes(window.location.hostname) || window.location.hostname === (window.__LOCAL_HOSTNAME__ || '');
  const _authRequired = window.__AUTH_ENABLED__ !== false; // server injects this; false = auth disabled = always allow
  if (!_isLocal && _authRequired && (!_tg || !_tg.initData)) {
    document.addEventListener('DOMContentLoaded', () => {
      document.body.innerHTML = `
        <div style="font-family:sans-serif;text-align:center;padding:60px 20px;max-width:400px;margin:0 auto">
          <img src="./favicon.svg" style="width:64px;margin-bottom:16px" alt="FlowBoard">
          <h2 style="margin:0 0 8px">FlowBoard</h2>
          <p style="color:#888;margin:0 0 24px">Please open via Telegram.</p>
          <p style="color:#aaa;font-size:14px">Open this dashboard from your Telegram bot.</p>
        </div>`;
    });
  }
</script>

<div class="app" id="app">
  <div class="sidebar-backdrop"></div>
  <div class="header">
    <div class="header-left">
      <button class="sidebar-toggle" data-action="toggle-sidebar" title="Toggle sidebar">☰</button>
      <span class="header-logo"><img src="./favicon.svg" alt="FlowBoard"></span>
      <div class="header-brand">
        <div class="header-title">FlowBoard</div>
        <div class="header-subtitle">Project Management</div>
      </div>
    </div>
    <div class="header-right" id="headerRight"></div>
  </div>

  <div class="tab-bar" id="tabBar">
    <button class="tab" data-tab="ideas">Ideas</button>
    <button class="tab active" data-tab="tasks">Tasks</button>
    <button class="tab" data-tab="files">Files</button>
    <span class="tab-bar-spacer"></span>
    <span id="tabBarRight"></span>
  </div>

  <div class="sidebar" id="sidebar">
    <div class="sidebar-label">Projects</div>
    <div id="projectList"></div>
    <div class="sidebar-actions" id="sidebarActions"></div>
  </div>

  <div class="content" id="content"></div>
</div>

<div class="toast-container" id="toastContainer"></div>
<div id="modalRoot"></div>

  <!-- Task Detail Panel (Slide-over) -->
  <div id="taskDetailPanel" class="task-detail-panel hide">
    <div class="detail-header">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
        <span id="detailTaskId" class="mono" style="opacity:0.6;font-size:12px">T-XXX</span>
        <button id="closeDetail" class="btn-close-detail">✕</button>
      </div>
      <h2 id="detailTitle" style="margin:0;font-size:18px;line-height:1.3">Task Title</h2>
    </div>
    <div id="detailActions" class="detail-actions"></div>
    <div id="detailScroll" class="detail-scroll-area">
      <div id="detailDescription" class="detail-section" style="padding: 16px; border-bottom: 1px solid var(--border)"></div>
      <div id="activityFeed" class="activity-feed"></div>
    </div>
    <div class="detail-footer">
      <div class="comment-input-wrap">
        <textarea id="commentText" placeholder="Schreibe einen Kommentar..." rows="1"></textarea>
        <button id="sendComment" class="btn-send-comment">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"></path></svg>
        </button>
      </div>
    </div>
  </div>

  <script type="module" src="./js/app.js?v=25"></script>

</body>
</html>
