name: CI

on:
  pull_request:
  push:
    branches:
      - dev
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - name: Install dashboard dependencies
        run: npm ci
        working-directory: dashboard
      - name: Privacy scan
        run: npm run privacy:scan
      - name: Install OpenClaw CLI for package canary
        run: npm install -g openclaw@2026.6.6
      - name: Plugin lint
        run: npm run plugin:lint
      - name: Release install canary
        run: npm run release:install-canary
      - name: Dashboard build
        run: npm run build
        working-directory: dashboard
      - name: Prepare dashboard integration fixture
        run: |
          mkdir -p ~/.openclaw/workspace/projects
          mkdir -p /tmp/flowboard-ci-projects/flowboard
          cat > /tmp/flowboard-ci-projects/flowboard/PROJECT.md <<'EOF'
          # FlowBoard

          ## Goal
          CI fixture project for FlowBoard integration tests.

          ## Operational State
          Current work, task status, claims, priorities, and next implementation steps live in FlowBoard/HZL tasks, not in this file.
          EOF
      - name: Start dashboard server
        run: |
          nohup npm start > /tmp/flowboard-dashboard.log 2>&1 &
          for i in {1..40}; do
            if curl -fsS http://localhost:18790/api/health >/dev/null; then
              curl -fsS -X POST http://localhost:18790/api/projects/flowboard/heal \
                -H 'Content-Type: application/json' \
                -d '{"displayName":"FlowBoard","description":"CI fixture project."}' >/dev/null
              exit 0
            fi
            sleep 0.5
          done
          cat /tmp/flowboard-dashboard.log
          exit 1
        working-directory: dashboard
        env:
          FLOWBOARD_PROJECTS_DIR: /tmp/flowboard-ci-projects
          FLOWBOARD_REPO: ${{ github.workspace }}
      - name: Dashboard tests
        run: npm test
        working-directory: dashboard
        env:
          FLOWBOARD_PROJECTS_DIR: /tmp/flowboard-ci-projects
          FLOWBOARD_API: http://localhost:18790
          FLOWBOARD_REPO: ${{ github.workspace }}
